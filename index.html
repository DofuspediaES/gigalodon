<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Fish Puzzle Solver</title>

<style>
body{
background:#111;
color:#fff;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
gap:40px;
}

#container{
display:flex;
gap:40px;
align-items:flex-start;
}

/* TABLERO */
#board{
display:grid;
grid-template-columns:repeat(4,75px);
gap:10px;
}

/* BURBUJAS */
.cell{
width:75px;
height:75px;
border-radius:50%;
background:#000;
border:2px solid #333;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
position:relative;
transition:0.2s;
user-select:none;
}

/* azul agua de mar */
.cell.on{
background:#00bcd4;
box-shadow:0 0 18px #00bcd4;
border-color:#b2ebf2;
}

/* pez */
.cell.on::after{
content:"🐟";
position:absolute;
font-size:28px;
}

/* número encima */
.number{
position:absolute;
top:-6px;
left:50%;
transform:translateX(-50%);
background:#000;
color:#ffd600;
font-weight:bold;
font-size:14px;
padding:2px 6px;
border-radius:6px;
border:1px solid #ffd600;
box-shadow:0 0 6px #000;
}

/* PANEL */
#panel{
min-width:260px;
background:#1a1a1a;
padding:15px;
border-radius:10px;
border:1px solid #333;
}

#panel h3{
margin-top:0;
color:#ffd600;
}

#panel p{
line-height:1.5;
margin:8px 0;
}

button{
margin:5px;
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:14px;
}

</style>
</head>

<body>

<div id="container">

<!-- TABLERO -->
<div>
<h3 style="text-align:center;">Puzzle de Peces</h3>

<div id="board"></div>

<div style="text-align:center;margin-top:10px;">
<button onclick="solve()">Resolver</button>
<button onclick="resetBoard()">Reiniciar</button>
</div>
</div>

<!-- PANEL INSTRUCCIONES -->
<div id="panel">
<h3>Instrucciones</h3>

<p>1. Verifica los peces iluminados en el juego.</p>
<p>2. Marca las casillas en este generador según lo observado.</p>
<p>3. Pulsa "Resolver".</p>
<p>4. Sigue el orden indicado encima de las burbujas dentro del juego.</p>

</div>

</div>

<script>

const size = 4;
const N = size * size;

const board = document.getElementById("board");

let state = Array(N).fill(0);
let cells = [];
let locked = false;

// CREAR TABLERO
for(let i=0;i<N;i++){

const cell = document.createElement("div");
cell.className = "cell";

cell.onclick = () => {

if(locked) return;

state[i] ^= 1;
cell.classList.toggle("on");

// pez (via class, no innerText)
};

board.appendChild(cell);
cells.push(cell);

}

// RESET
function resetBoard(){

locked = false;
state.fill(0);

cells.forEach(c=>{
c.classList.remove("on","locked");
c.innerHTML = "";
});

}

// MATRIZ
function buildMatrix(){

let M = [];

for(let i=0;i<N;i++){

let row = Array(N).fill(0);

let x = i % size;
let y = Math.floor(i / size);

row[i] = 1;

if(y > 0) row[i - size] = 1;
if(y < size-1) row[i + size] = 1;
if(x > 0) row[i - 1] = 1;
if(x < size-1) row[i + 1] = 1;

M.push(row);

}

return M;

}

// GAUSS
function solveSystem(M,b){

let n = M.length;

for(let i=0;i<n;i++){
M[i].push(b[i]);
}

let row = 0;

for(let col=0;col<n;col++){

let sel = row;

for(let i=row;i<n;i++){
if(M[i][col]){ sel = i; break; }
}

if(!M[sel][col]) continue;

[ M[row], M[sel] ] = [ M[sel], M[row] ];

for(let i=0;i<n;i++){
if(i!==row && M[i][col]){
for(let j=col;j<=n;j++){
M[i][j] ^= M[row][j];
}
}
}

row++;

}

let x = Array(n).fill(0);

for(let i=0;i<n;i++){
x[i] = M[i][n] || 0;
}

return x;

}

// 🔥 mostrar números encima de burbujas
function showSolution(sol){

// limpiar números previos
cells.forEach(c=>{
let old = c.querySelector(".number");
if(old) old.remove();
});

let order = 1;

for(let i=0;i<N;i++){

if(sol[i]){

let span = document.createElement("div");
span.className = "number";
span.innerText = order;

cells[i].appendChild(span);

order++;

}

}

}

// RESOLVER
function solve(){

if(locked) return;

let M = buildMatrix();
let b = [...state];

let sol = solveSystem(M,b);

locked = true;

showSolution(sol);

// bloquear tablero visualmente
cells.forEach(c=>{
c.classList.add("locked");
});

}

</script>

</body>
</html>
